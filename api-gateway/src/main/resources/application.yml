server:
  port: 8080 # El frontend solo llama a http://localhost:8080/api/...

spring:
  cloud:
    gateway:
      routes:
        - id: reporte-incendio
          uri: http://localhost:8081
          predicates:
            - Path=/api/reporte-incendio,/api/reporte-incendio/**

        - id: user-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/usuario,/api/usuario/**

        - id: alert-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/alerta-emergencia,/api/alerta-emergencia/**
